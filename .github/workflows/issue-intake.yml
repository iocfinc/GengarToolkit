name: Issue Intake

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  intake:
    runs-on: ubuntu-latest
    steps:
      - name: Post intake guidance
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue.number;
            const body = [
              "Issue intake checklist:",
              "",
              "- Run `agent/skills/read_issue.md`.",
              "- Classify the issue as Feature, Bug, Documentation, or Refactor.",
              "- Record priority and affected components.",
              "- Keep the lead agent focused on orchestration and choose bounded sub-agents from `skills.md` for non-trivial work.",
              "- Route feature work to `agent/skills/plan_feature.md`.",
              "- Route bug work to `agent/skills/triage_bug.md`.",
              "- For frontend-facing work, plan browser debugging and screenshot validation before PR prep, preferring Chrome DevTools MCP when it is configured."
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body
            });
