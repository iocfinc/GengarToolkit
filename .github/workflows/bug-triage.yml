name: Bug Triage

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  triage:
    if: github.event.label.name == 'bug'
    runs-on: ubuntu-latest
    steps:
      - name: Post bug triage checklist
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue.number;
            const body = [
              "Bug triage checklist:",
              "",
              "- Run `agent/skills/triage_bug.md`.",
              "- Confirm the affected subsystem.",
              "- Propose the narrowest fix.",
              "- Identify regression tests before implementation.",
              "- Use browser debugging for UI-facing bugs and capture screenshots before PR prep when browser tooling is available."
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body
            });
