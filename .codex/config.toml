model = "gpt-5"

# Maintainers may switch into Cycle Mode for a multi-issue delivery stream.
# When that happens, keep checkpoint commits per issue and record the implementation order.
approval_policy = "on-failure"
[agents]
max_threads = 7
max_depth = 1

[agents.slardar]
description = "Read-only codebase explorer for locating architecture seams, reusable packages, committed-HEAD deltas, and the smallest safe slice to land first."
config_file = "../agents/explorer.toml"

[agents.omniknight]
description = "Design system reviewer that enforces tokens, themes, spacing, palette behavior, reusable UI primitives, and review-driven visual polish passes."
config_file = "../agents/design-guardian.toml"

[agents.tinker]
description = "Front-end builder for app shell, routing, shared UI workflows, and checkpoint-ready feature slices with explicit test impact."
config_file = "../agents/frontend-architect.toml"

[agents.kunkka]
description = "Chart implementation specialist for data contracts, templates, and responsive rendering."
config_file = "../agents/chart-engine.toml"

[agents.gyrocopter]
description = "Export and render specialist for deterministic output, compatibility shims, browser API mock planning, and parity-risk review."
config_file = "../agents/export-engine.toml"

[agents.bounty_hunter]
description = "UI debugger that runs the product, prefers Chrome DevTools MCP when configured, captures repro steps, inspects console and layout failures, and reports the smallest plausible fix."
config_file = "../agents/browser-debugger.toml"

[agents.sniper]
description = "Browser screenshot specialist that prefers Chrome DevTools MCP when configured, captures feature states, flags obvious visual regressions, and returns artifact paths plus proof notes or an immediate skip reason for PR prep."
config_file = "../agents/browser-screenshot.toml"

[agents.oracle]
description = "OpenAI and Codex docs researcher that uses the OpenAI developer docs MCP server for authoritative product, MCP, and integration guidance."
config_file = "../agents/openai-docs-researcher.toml"

[agents.clinkz]
description = "Documentation and DX specialist for concise README, changelog, agent-workflow, and issue-summary updates with explicit file references."
config_file = "../agents/docs-writer.toml"
